kind = "web"
previewPath = "/community-dashboard/"
title = "Family & Community Dashboard"
version = "1.0.0"
id = "artifacts/community-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/community-dashboard/" ]
localPort = 8084

[services.development]
run = "node /home/runner/workspace/artifacts/community-dashboard/start.mjs"

[services.production]
build = [ "pnpm", "--filter", "@workspace/community-dashboard", "run", "build" ]
publicDir = "artifacts/community-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8084"
BASE_PATH = "/community-dashboard/"
